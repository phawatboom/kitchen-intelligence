version: '3.8'

services:
  app:
    build: .
    container_name: kitchen-os
    # Ports removed here, only internal now
    expose:
      - "8000"
    volumes:
      # Persist the database file so it survives restarts
      - kitchen-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/kitchen.db
    # Run migrations/init on startup (optional but good practice)
    command: >
      sh -c "python -m backend.init_db && 
             python -m backend.seed_variety &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000"

  nginx:
    image: nginx:alpine
    container_name: kitchen-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  kitchen-data:
